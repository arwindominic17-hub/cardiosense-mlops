# dvc.yaml
# =========
# CardioSense AI — DVC Pipeline Definition
# Run with: dvc repro
# Visualize with: dvc dag

stages:

  # ── Stage 1: Train (full pipeline) ───────────────────────────
  train:
    cmd: python run_pipeline.py
    deps:
      - data/heart.csv
      - src/preprocess.py
      - src/train.py
      - src/pipeline.py
      - src/evaluate.py
    params:
      - params.yaml:
          - data.test_size
          - data.random_state
          - train.n_estimators_rf
          - train.n_estimators_gb
          - train.learning_rate_gb
          - train.max_depth_gb
          - train.min_sensitivity
          - train.min_specificity
    outs:
      - models/production_bundle.pkl
      - models/RandomForest.pkl
      - models/GradientBoosting.pkl
      - models/RandomForest_classification_report.txt
      - models/GradientBoosting_classification_report.txt
      - models/RandomForest_feature_importance.json
      - models/GradientBoosting_feature_importance.json
    metrics:
      - models/evaluation_report.json:
          cache: false
