name: CardioSense AI — MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Retrain weekly every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

env:
  PYTHON_VERSION: "3.12"
  EXPERIMENT_NAME: "CardioSense_AI"
  DATA_PATH: "data/heart.csv"
  MODELS_DIR: "models"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Static Analysis
  # ─────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check --line-length 100 src/ api/ tests/

      - name: Check import order (isort)
        run: isort --check-only --profile black src/ api/ tests/

      - name: Lint (flake8)
        run: flake8 src/ api/ tests/ --max-line-length=100 --ignore=E203,W503

  # ─────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ─────────────────────────────────────────
  # JOB 3: Train & Track with MLflow
  # ─────────────────────────────────────────
  train:
    name: Train Model (MLflow)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MLOps training pipeline
        env:
          DATA_PATH:    ${{ env.DATA_PATH }}
          MODELS_DIR:   ${{ env.MODELS_DIR }}
          EXPERIMENT:   ${{ env.EXPERIMENT_NAME }}
        run: |
          cd src
          python pipeline.py

      - name: Gate on minimum AUC-ROC
        run: |
          python - <<'EOF'
          import json, sys
          with open("models/evaluation_report.json") as f:
              report = json.load(f)
          auc  = report["performance"]["auc_roc"]
          sens = report["performance"]["sensitivity"]
          spec = report["performance"]["specificity"]
          print(f"AUC-ROC={auc}  Sensitivity={sens}  Specificity={spec}")
          if auc < 0.85:
              print(f"FAIL: AUC-ROC {auc} < 0.85")
              sys.exit(1)
          if sens < 0.80:
              print(f"FAIL: Sensitivity {sens} < 0.80")
              sys.exit(1)
          if spec < 0.70:
              print(f"FAIL: Specificity {spec} < 0.70")
              sys.exit(1)
          print("PASS: Model meets all clinical production quality gates")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            mlruns/

  # ─────────────────────────────────────────
  # JOB 4: Build & Test Docker Image
  # ─────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - name: Build Docker image
        run: |
          docker build -t cardiosense-ai:${{ github.sha }} .
          docker tag cardiosense-ai:${{ github.sha }} cardiosense-ai:latest

      - name: Smoke test the API container
        run: |
          docker run -d -p 5000:5000 \
            -e BUNDLE_PATH=/app/models/production_bundle.pkl \
            --name cardiosense-test \
            cardiosense-ai:latest

          # Wait for startup
          sleep 5

          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

          # Prediction test
          PRED_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":58,"sex":1,"cp":0,"trestbps":140,"chol":268,"fbs":0,
                 "restecg":0,"thalach":152,"exang":1,"oldpeak":2.1,
                 "slope":1,"ca":1,"thal":2}')
          echo "Prediction status: $PRED_STATUS"
          [ "$PRED_STATUS" = "200" ] || exit 1

          docker stop cardiosense-test

      - name: Push to container registry (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag cardiosense-ai:latest ghcr.io/${{ github.repository }}/cardiosense-ai:latest
          docker tag cardiosense-ai:latest ghcr.io/${{ github.repository }}/cardiosense-ai:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/cardiosense-ai:latest
          docker push ghcr.io/${{ github.repository }}/cardiosense-ai:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 5: Deploy (main branch only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy to server
        run: |
          echo "Deploying cardiosense-ai:${{ github.sha }} to production"
          # In real deployment, replace with:
          # ssh deploy@your-server 'docker pull ghcr.io/.../cardiosense-ai:latest && docker-compose up -d'

      - name: Notify deployment
        run: |
          echo "Deployment of CardioSense AI complete"
          echo "Commit: ${{ github.sha }}"
          echo "Model: RandomForest v1.0"
